<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <h1>조회 페이지 로그인</h1>
      <p class="login-info">입력 페이지에서 설정한 아이디와 비밀번호로 로그인하세요.</p>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="userId">아이디</label>
          <input type="text" id="userId" name="userId" required autofocus placeholder="아이디를 입력하세요">
        </div>
        <div class="form-group">
          <label for="userPassword">비밀번호</label>
          <input type="password" id="userPassword" name="userPassword" required placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn btn-primary">로그인</button>
      </form>
      <div class="login-footer">
        <p>계정이 없으신가요? <a href="input.html">입력 페이지</a>에서 계정을 설정하세요.</p>
      </div>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
