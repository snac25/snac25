<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입력 페이지</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>데이터 입력 페이지</h1>
    
    <div class="nav">
      <a href="input.html" class="active">입력</a>
      <a href="view.html">조회</a>
    </div>

    <div class="options-panel">
      <button class="btn btn-secondary" onclick="openOptions()">옵션 설정 열기</button>
      <button class="btn" onclick="addRow()">행 추가</button>
      <button class="btn btn-secondary" onclick="saveAll()">저장하기</button>
      <button class="btn btn-info" onclick="openAccountModal()">조회 계정 설정</button>
      <button class="btn btn-warning" onclick="openAccountManageModal()">계정 관리</button>
    </div>

    <!-- 조회 계정 설정 모달 -->
    <div id="accountModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAccountModal()">&times;</span>
        <h2>조회 페이지 계정 설정</h2>
        <form id="accountForm" onsubmit="saveAccount(event)">
          <div class="form-group">
            <label for="accountId">아이디</label>
            <input type="text" id="accountId" name="accountId" required placeholder="아이디를 입력하세요">
          </div>
          <div class="form-group">
            <label for="accountPassword">비밀번호</label>
            <input type="password" id="accountPassword" name="accountPassword" required placeholder="비밀번호를 입력하세요">
          </div>
          <div class="form-group">
            <label for="accountPasswordConfirm">비밀번호 확인</label>
            <input type="password" id="accountPasswordConfirm" name="accountPasswordConfirm" required placeholder="비밀번호를 다시 입력하세요">
          </div>
          <button type="submit" class="btn btn-primary">저장</button>
          <button type="button" class="btn btn-secondary" onclick="closeAccountModal()">취소</button>
        </form>
      </div>
    </div>

    <!-- 계정 관리 모달 -->
    <div id="accountManageModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAccountManageModal()">&times;</span>
        <h2>계정 관리</h2>
        <div id="accountList" class="account-list">
          <!-- 계정 목록이 동적으로 추가됩니다 -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeAccountManageModal()">닫기</button>
        </div>
      </div>
    </div>

    <h2>입력 시트</h2>
    <table id="inputTable">
      <thead>
        <tr>
          <th rowspan="2">번호</th>
          <th rowspan="2">시간</th>
          <th rowspan="2">리그</th>
          <th rowspan="2">홈팀</th>
          <th rowspan="2">원정팀</th>
          <th colspan="4">기준배당</th>
          <th colspan="2">75</th>
          <th colspan="2">현배당</th>
          <th colspan="2">하락수치</th>
          <th colspan="2">판정</th>
          <th rowspan="2">조작</th>
        </tr>
        <tr>
          <th>승정보</th>
          <th>승</th>
          <th>오버정보</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- 행이 동적으로 추가됩니다 -->
      </tbody>
    </table>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="input.js"></script>
</body>
</html>
