<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입력 페이지</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="input-page">
  <!-- 코드 입력 화면 -->
  <div id="codeScreen">
    <div class="login-container">
      <div class="login-box">
      <h1>S N A C</h1>
      <form id="codeForm" onsubmit="checkCode(event)">
        <div class="form-group">
          <label for="accessCode">접근 코드</label>
          <input type="password" id="accessCode" name="accessCode" required autofocus placeholder="코드를 입력하세요">
        </div>
        <button type="submit" class="btn btn-primary">확인</button>
        <div id="errorMessage" style="color: #ff4444; margin-top: 15px; text-align: center; display: none;">
          잘못된 코드입니다.
        </div>
      </form>
      </div>
    </div>
  </div>

  <!-- 실제 입력 페이지 내용 -->
  <div id="inputScreen" class="container" style="display: none;">
    <h1>S N A C</h1>
    
    <div class="nav">
      <a href="/">조회</a>
    </div>

    <div class="options-panel">
      <button class="btn btn-secondary" onclick="openOptions()">옵션 설정</button>
      <button class="btn btn-info" onclick="openAccountModal()">계정 생성</button>
      <button class="btn btn-warning" onclick="openAccountManageModal()">계정 관리</button>
      <button class="btn btn-danger" onclick="deleteAllRows()">시트 전체 삭제</button>
    </div>

    <!-- 조회 계정 설정 모달 -->
    <div id="accountModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAccountModal()">&times;</span>
        <h2>계정 생성</h2>
        <form id="accountForm" onsubmit="saveAccount(event)">
          <div class="form-group">
            <label for="accountId">아이디</label>
            <input type="text" id="accountId" name="accountId" required placeholder="아이디를 입력하세요">
          </div>
          <div class="form-group">
            <label for="accountPassword">비밀번호</label>
            <input type="password" id="accountPassword" name="accountPassword" required placeholder="비밀번호를 입력하세요">
          </div>
          <div class="form-group">
            <label for="accountPasswordConfirm">비밀번호 확인</label>
            <input type="password" id="accountPasswordConfirm" name="accountPasswordConfirm" required placeholder="비밀번호를 다시 입력하세요">
          </div>
          <button type="submit" class="btn btn-primary">저장</button>
          <button type="button" class="btn btn-secondary" onclick="closeAccountModal()">취소</button>
        </form>
      </div>
    </div>

    <!-- 계정 관리 모달 -->
    <div id="accountManageModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAccountManageModal()">&times;</span>
        <h2>계정 관리</h2>
        <div id="accountList" class="account-list">
          <!-- 계정 목록이 동적으로 추가됩니다 -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeAccountManageModal()">닫기</button>
        </div>
      </div>
    </div>

    <h2>입력 시트</h2>
    <div class="sheet-buttons">
      <button class="btn btn-secondary btn-large" onclick="saveAll()">저장하기</button>
      <button class="btn btn-large" onclick="addRow()">행 추가</button>
    </div>
    <table id="inputTable">
      <colgroup>
        <col style="width: 2.63%;">  <!-- 1. 번호 (2.8/106.3) -->
        <col style="width: 3.95%;">  <!-- 2. 시간 (4.2/106.3) -->
        <col style="width: 9.41%;">  <!-- 3. 리그 (10/106.3) -->
        <col style="width: 9.41%;">  <!-- 4. 홈팀 (10/106.3) -->
        <col style="width: 9.41%;">  <!-- 5. 원정팀 (10/106.3) -->
        <col style="width: 3.77%;">  <!-- 6. 승정보 (4/106.3) -->
        <col style="width: 4.24%;">  <!-- 7. 승-G열 (4.5/106.3) -->
        <col style="width: 3.77%;">  <!-- 8. 오버정보 (4/106.3) -->
        <col style="width: 4.24%;">  <!-- 9. 오버-I열 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 10. 승-J열 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 11. 오버-K열 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 12. 승-L열 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 13. 오버-M열 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 14. 승-하락수치 (4.5/106.3) -->
        <col style="width: 4.24%;">  <!-- 15. 오버-하락수치 (4.5/106.3) -->
        <col style="width: 7.53%;">  <!-- 16. 오버-등급 (8/106.3) -->
        <col style="width: 4.71%;">  <!-- 17. 승-등급 (5/106.3) -->
        <col style="width: 5.64%;">  <!-- 18. 기능 (6/106.3) -->
      </colgroup>
      <thead>
        <tr>
          <th rowspan="2">번호</th>
          <th rowspan="2">시간</th>
          <th rowspan="2">리그</th>
          <th rowspan="2">홈팀</th>
          <th rowspan="2">원정팀</th>
          <th colspan="4">기준배당</th>
          <th colspan="2">75</th>
          <th colspan="2">현배당</th>
          <th colspan="2">하락수치</th>
          <th colspan="2">등급</th>
          <th rowspan="2">기능</th>
        </tr>
        <tr>
          <th>홈/원정</th>
          <th>승</th>
          <th>오버기준</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>승</th>
          <th>오버</th>
          <th>오버</th>
          <th>승</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- 행이 동적으로 추가됩니다 -->
      </tbody>
    </table>
  </div>

  <script>
    const ACCESS_CODE = 'bbjjbb';

    // 페이지 로드 시 인증 상태 확인
    window.addEventListener('DOMContentLoaded', () => {
      const isAuthenticated = sessionStorage.getItem('bjb_authenticated');
      if (isAuthenticated === 'true') {
        showInputScreen();
      } else {
        showCodeScreen();
      }
    });

    // 코드 확인 함수
    function checkCode(event) {
      event.preventDefault();
      const codeInput = document.getElementById('accessCode');
      const errorMessage = document.getElementById('errorMessage');
      
      if (codeInput.value === ACCESS_CODE) {
        sessionStorage.setItem('bjb_authenticated', 'true');
        showInputScreen();
      } else {
        errorMessage.style.display = 'block';
        codeInput.value = '';
        codeInput.focus();
      }
    }

    // 코드 입력 화면 표시
    function showCodeScreen() {
      document.getElementById('codeScreen').style.display = 'flex';
      document.getElementById('inputScreen').style.display = 'none';
    }

    // 입력 화면 표시
    function showInputScreen() {
      document.getElementById('codeScreen').style.display = 'none';
      document.getElementById('inputScreen').style.display = 'block';
      // 입력 페이지 스크립트 로드
      loadInputScripts();
    }

    // 입력 페이지 스크립트 동적 로드
    function loadInputScripts() {
      if (!window.inputScriptsLoaded) {
        // 스크립트를 순차적으로 로드
        const loadScript = (src) => {
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });
        };
        
        loadScript('../firebase-config.js')
          .then(() => loadScript('../app.js'))
          .then(() => loadScript('../input.js'))
          .then(() => {
            // 모든 스크립트 로드 완료 후 초기화
            setTimeout(() => {
              // input.js의 DOMContentLoaded 이벤트를 수동으로 트리거
              const event = new Event('DOMContentLoaded');
              window.dispatchEvent(event);
            }, 200);
          })
          .catch(err => console.error('스크립트 로드 실패:', err));
        
        window.inputScriptsLoaded = true;
      }
    }
  </script>
</body>
</html>
